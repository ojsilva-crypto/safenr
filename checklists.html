<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeNR — Checklists</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1923; color: #fff;
      display: flex; min-height: 100vh;
    }
    .sidebar {
      width: 240px; background: #0a1520;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      padding: 24px 0; position: fixed; height: 100vh;
    }
    .sidebar-logo { text-align: center; padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-logo h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; }
    .sidebar-logo h1 span { color: #00d4ff; }
    .sidebar-logo p { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .nav { flex: 1; padding: 20px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 24px; cursor: pointer;
      color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 500;
      transition: all 0.2s; border-left: 3px solid transparent; text-decoration: none;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #00d4ff; border-left-color: #00d4ff; background: rgba(0,212,255,0.06); }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-user {
      padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 0.85rem;
    }
    .user-info p { font-size: 0.82rem; font-weight: 600; }
    .user-info span { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
    .btn-sair {
      background: none; border: none; color: rgba(255,80,80,0.7);
      cursor: pointer; font-size: 0.8rem; margin-left: auto;
    }
    .btn-sair:hover { color: #ff6b6b; }
    .main { margin-left: 240px; flex: 1; padding: 32px; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
    .topbar h2 { font-size: 1.4rem; font-weight: 700; }
    .topbar p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 4px; }
    .nrs-select-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px;
    }
    .nr-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 18px 12px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; display: flex;
      flex-direction: column; align-items: center; gap: 6px;
    }
    .nr-btn:hover { background: rgba(0,212,255,0.07); border-color: rgba(0,212,255,0.3); }
    .nr-btn.active { background: rgba(0,212,255,0.12); border-color: #00d4ff; box-shadow: 0 0 0 1px #00d4ff22; }
    .nr-btn-icon { font-size: 1.5rem; }
    .nr-btn-code { font-size: 0.88rem; font-weight: 800; color: #00d4ff; }
    .nr-btn-nome { font-size: 0.68rem; color: rgba(255,255,255,0.4); }
    .checklist-area {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px;
    }
    .checklist-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .checklist-header-left h3 { font-size: 1.1rem; font-weight: 700; }
    .checklist-header-left p { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 3px; }
    .progress-wrap { display: flex; align-items: center; gap: 12px; }
    .progress-bar-bg {
      width: 160px; height: 8px;
      background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; background: #00d4ff; }
    .progress-pct { font-size: 0.88rem; font-weight: 700; color: #00d4ff; min-width: 36px; }
    .btn-reset {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer;
