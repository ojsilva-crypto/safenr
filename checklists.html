<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeNR — Checklists</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0f1923;color:#fff;display:flex;min-height:100vh}
    .sidebar{width:240px;background:#0a1520;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;padding:24px 0;position:fixed;height:100vh}
    .sidebar-logo{text-align:center;padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,.07)}
    .sidebar-logo h1{font-size:1.6rem;font-weight:800;letter-spacing:2px}
    .sidebar-logo h1 span{color:#00d4ff}
    .sidebar-logo p{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:2px}
    .nav{flex:1;padding:20px 0}
    .nav-item{display:flex;align-items:center;gap:12px;padding:13px 24px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.9rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;text-decoration:none}
    .nav-item:hover{color:#fff;background:rgba(255,255,255,.04)}
    .nav-item.active{color:#00d4ff;border-left-color:#00d4ff;background:rgba(0,212,255,.06)}
    .nav-item .icon{font-size:1.1rem;width:20px;text-align:center}
    .sidebar-user{padding:16px 24px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
    .avatar{width:36px;height:36px;background:linear-gradient(135deg,#00d4ff,#0099cc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
    .user-info p{font-size:.82rem;font-weight:600}
    .user-info span{font-size:.72rem;color:rgba(255,255,255,.4)}
    .btn-sair{background:none;border:none;color:rgba(255,80,80,.7);cursor:pointer;font-size:.8rem;margin-left:auto}
    .main{margin-left:240px;flex:1;padding:32px}
    .topbar{margin-bottom:28px}
    .topbar h2{font-size:1.4rem;font-weight:700}
    .topbar p{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:4px}
    .nr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .nr-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;cursor:pointer;transition:all .2s}
    .nr-card:hover{background:rgba(255,255,255,.07);transform:translateY(-2px)}
    .nr-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .nr-tag{font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(0,212,255,.12);color:#00d4ff}
    .pct-text{font-size:.82rem;color:rgba(255,255,255,.4)}
    .nr-card h3{font-size:1rem;font-weight:700;margin-bottom:4px}
    .nr-card p{font-size:.78rem;color:rgba(255,255,255,.35);margin-bottom:14px}
    .progresso-bar{height:6px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
    .progresso-fill{height:100%;border-radius:10px;transition:width .6s}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#0f1923;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:36px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .modal-header h3{font-size:1.2rem;font-weight:700}
    .btn-fechar{background:none;border:none;color:rgba(255,255,255,.4);font-size:1.4rem;cursor:pointer}
    .checklist-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .checklist-item:last-child{border-bottom:none}
    .item-texto{font-size:.88rem;flex:1;padding-right:16px;line-height:1.4}
    .item-acoes{display:flex;gap:8px}
    .btn-check{padding:7px 14px;border-radius:8px;border:1px solid;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;background:transparent}
    .btn-check.ok{border-color:#4ade80;color:#4ade80}
    .btn-check.ok.sel{background:#4ade80;color:#000}
    .btn-check.nc{border-color:#f87171;color:#f87171}
    .btn-check.nc.sel{background:#f87171;color:#fff}
    .btn-check.na{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.4)}
    .btn-check.na.sel{background:rgba(255,255,255,.15);color:#fff}
    .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}
    .pct-resumo{font-size:.9rem;color:rgba(255,255,255,.5)}
    .pct-resumo strong{color:#00d4ff}
    .btn-salvar{padding:12px 28px;border-radius:10px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>Safe<span>NR</span></h1>
    <p>Gestão de Segurança do Trabalho</p>
  </div>
  <nav class="nav">
    <a class="nav-item" href="./app.html"><span class="icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="./inspecoes.html"><span class="icon">🔍</span> Inspeções</a>
    <a class="nav-item" href="./riscos.html"><span class="icon">⚠️</span> Riscos</a>
    <a class="nav-item active" href="./checklists.html"><span class="icon">📋</span> Checklists</a>
    <a class="nav-item" href="./funcionarios.html"><span class="icon">👷</span> Funcionários</a>
    <a class="nav-item" href="./relatorios.html"><span class="icon">📄</span> Relatórios</a>
    <a class="nav-item" href="#"><span class="icon">⚙️</span> Configurações</a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar" id="avatarLetra">A</div>
    <div class="user-info">
      <p id="nomeUsuario">Usuário</p>
      <span>Administrador</span>
    </div>
    <button class="btn-sair" onclick="sair()">✕</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h2>📋 Checklists de NRs</h2>
    <p>Avalie a conformidade de cada Norma Regulamentadora</p>
  </div>
  <div class="nr-grid" id="nrGrid"></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitulo"></h3>
      <button class="btn-fechar" onclick="fecharModal()">✕</button>
    </div>
    <div id="modalItens"></div>
    <div class="modal-footer">
      <div class="pct-resumo">Conformidade: <strong id="pctAtual">0%</strong></div>
      <button class="btn-salvar" onclick="salvarChecklist()">💾 Salvar</button>
    </div>
  </div>
</div>
<script>
var userData=localStorage.getItem('safenr_user');
if(!userData){window.location.href='./index.html';}
var user=JSON.parse(userData);
document.getElementById('nomeUsuario').textContent=user.nome||'Usuário';
document.getElementById('avatarLetra').textContent=(user.nome||'U')[0].toUpperCase();
function sair(){localStorage.removeItem('safenr_user');window.location.href='./index.html';}
var NRS={
  'NR-05':{nome:'CIPA',desc:'Comissão Interna de Prevenção de Acidentes',itens:['Há CIPA constituída e registrada?','Mandato da CIPA está vigente?','Atas de reunião estão em dia?','Mapa de riscos elaborado?','Membros treinados (20h)?','CIPA realizou inspeções no período?','Plano de trabalho anual elaborado?','Comunicação de acidente registrada (CAT)?']},
  'NR-06':{nome:'EPI',desc:'Equipamentos de Proteção Individual',itens:['EPIs fornecidos gratuitamente?','EPIs possuem CA válido?','Treinamento de uso ministrado?','Ficha de EPI assinada?','EPIs em bom estado de conservação?','Controle de troca realizado?','Estoque de EPIs disponível?','Registros de entrega arquivados?']},
  'NR-07':{nome:'PCMSO',desc:'Programa de Controle Médico de Saúde Ocupacional',itens:['PCMSO elaborado por médico do trabalho?','Exames admissionais realizados?','Exames periódicos em dia?','Exames demissionais realizados?','ASO emitido para todos os funcionários?','Resultados arquivados no prontuário?','Ações corretivas implementadas?','Relatório anual do PCMSO elaborado?']},
  'NR-09':{nome:'Riscos Ambientais',desc:'Programa de Prevenção de Riscos Ambientais',itens:['PPRA elaborado e atualizado?','Antecipação de riscos realizada?','Reconhecimento de riscos realizado?','Avaliação quantitativa dos riscos?','Medidas de controle implementadas?','Monitoramento dos riscos realizado?','Registro e divulgação dos dados?','Trabalhadores informados sobre riscos?']},
  'NR-10':{nome:'Eletricidade',desc:'Segurança em Instalações e Serviços em Eletricidade',itens:['Prontuário das instalações elétricas atualizado?','Trabalhadores habilitados e autorizados?','Treinamento NR-10 em dia (bienal)?','EPI elétrico disponível e calibrado?','Procedimentos de trabalho documentados?','Sinalizações de segurança implantadas?','Plano de manutenção elétrica existente?','Bloqueio e etiquetagem (LOTO) aplicados?']},
  'NR-12':{nome:'Máquinas e Equipamentos',desc:'Segurança no Trabalho em Máquinas e Equipamentos',itens:['Inventário de máquinas elaborado?','Proteções nas zonas de perigo?','Dispositivos de parada de emergência?','Manutenção preventiva documentada?','Sinalização de advertência afixada?','Operadores treinados?','Manual do fabricante disponível?','Distâncias de segurança respeitadas?']},
  'NR-17':{nome:'Ergonomia',desc:'Ergonomia nos postos de trabalho',itens:['Análise ergonômica do trabalho (AET)?','Mobiliário adequado às tarefas?','Iluminação dos postos avaliada?','Temperatura e umidade monitoradas?','Pausas e alternância de tarefas previstas?','Levantamento manual de cargas avaliado?','Trabalhadores orientados sobre ergonomia?','Medidas corretivas implementadas?']},
  'NR-23':{nome:'Proteção Contra Incêndios',desc:'Prevenção e proteção contra incêndio',itens:['Extintores em locais sinalizados?','Extintores dentro do prazo de recarga?','Rotas de fuga sinalizadas?','Brigada de incêndio constituída?','Simulacro de evacuação realizado?','Saídas de emergência desobstruídas?','Treinamento de combate a incêndio?','Plano de emergência elaborado?']},
  'NR-35':{nome:'Trabalho em Altura',desc:'Condições mínimas para trabalho em altura',itens:['Trabalhadores autorizados por escrito?','Treinamento NR-35 em dia (bienal)?','APR elaborada antes de cada atividade?','Equipamentos de proteção contra quedas?','Ponto de ancoragem adequado e resistente?','Procedimento de resgate disponível?','Inspeção dos equipamentos antes do uso?','Comunicação entre equipe garantida?']}
};
var nrAtual=null;
var respostas={};
function getCor(pct){return pct>=80?'#4ade80':pct>=50?'#fbbf24':'#f87171';}
function renderGrid(){
  var grid=document.getElementById('nrGrid');
  grid.innerHTML='';
  Object.keys(NRS).forEach(function(nr){
    var data=NRS[nr];
    var saved=JSON.parse(localStorage.getItem('safenr_checklist_'+nr)||'{}');
    var total=data.itens.length;
    var ok=Object.values(saved).filter(function(v){return v==='ok';}).length;
    var pct=Math.round((ok/total)*100);
    var cor=getCor(pct);
    var card=document.createElement('div');
    card.className='nr-card';
    card.onclick=function(){abrirChecklist(nr);};
    card.innerHTML='<div class="nr-card-header"><span class="nr-tag">'+nr+'</span><span class="pct-text">'+pct+'%</span></div>'+
      '<h3>'+data.nome+'</h3><p>'+data.desc+'</p>'+
      '<div class="progresso-bar"><div class="progresso-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>';
    grid.appendChild(card);
  });
}
function abrirChecklist(nr){
  nrAtual=nr;
  var data=NRS[nr];
  respostas=JSON.parse(localStorage.getItem('safenr_checklist_'+nr)||'{}');
  document.getElementById('modalTitulo').textContent=nr+' — '+data.nome;
  var html='';
  data.itens.forEach(function(item,i){
    var r=respostas[i]||'';
    html+='<div class="checklist-item">'+
      '<span class="item-texto">'+item+'</span>'+
      '<div class="item-acoes">'+
        '<button class="btn-check ok'+(r==='ok'?' sel':'')+'" onclick="marcar('+i+',\'ok\',this)">✓ OK</button>'+
        '<button class="btn-check nc'+(r==='nc'?' sel':'')+'" onclick="marcar('+i+',\'nc\',this)">✗ NC</button>'+
        '<button class="btn-check na'+(r==='na'?' sel':'')+'" onclick="marcar('+i+',\'na\',this)">N/A</button>'+
      '</div></div>';
  });
  document.getElementById('modalItens').innerHTML=html;
  atualizarPct();
  document.getElementById('modal').classList.add('open');
}
function marcar(idx,val,btn){
  respostas[idx]=val;
  var acoes=btn.parentElement;
  acoes.querySelectorAll('.btn-check').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  atualizarPct();
}
function atualizarPct(){
  var total=NRS[nrAtual].itens.length;
  var ok=Object.values(respostas).filter(function(v){return v==='ok';}).length;
  var pct=Math.round((ok/total)*100);
  document.getElementById('pctAtual').textContent=pct+'%';
}
function salvarChecklist(){
  localStorage.setItem('safenr_checklist_'+nrAtual,JSON.stringify(respostas));
  fecharModal();
  renderGrid();
}
function fecharModal(){document.getElementById('modal').classList.remove('open');nrAtual=null;}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)fecharModal();});
renderGrid();
</script>
</body>
</html>
