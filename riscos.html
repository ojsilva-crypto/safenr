<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeNR — Riscos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1923; color: #fff;
      display: flex; min-height: 100vh;
    }
    .sidebar {
      width: 240px; background: #0a1520;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      padding: 24px 0; position: fixed; height: 100vh;
    }
    .sidebar-logo { text-align: center; padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-logo h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; }
    .sidebar-logo h1 span { color: #00d4ff; }
    .sidebar-logo p { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .nav { flex: 1; padding: 20px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 24px; cursor: pointer;
      color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 500;
      transition: all 0.2s; border-left: 3px solid transparent; text-decoration: none;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #00d4ff; border-left-color: #00d4ff; background: rgba(0,212,255,0.06); }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-user {
      padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 0.85rem;
    }
    .user-info p { font-size: 0.82rem; font-weight: 600; }
    .user-info span { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
    .btn-sair {
      background: none; border: none; color: rgba(255,80,80,0.7);
      cursor: pointer; font-size: 0.8rem; margin-left: auto;
    }
    .btn-sair:hover { color: #ff6b6b; }
    .main { margin-left: 240px; flex: 1; padding: 32px; }
    .topbar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 28px;
    }
    .topbar h2 { font-size: 1.4rem; font-weight: 700; }
    .topbar span { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    .btn-novo {
      background: linear-gradient(135deg, #f87171, #dc2626);
      border: none; border-radius: 10px; color: #fff;
      font-size: 0.9rem; font-weight: 700; padding: 12px 24px;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    }
    .btn-novo:hover { opacity: 0.85; transform: translateY(-1px); }
    .filtros { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .filtro-btn {
      padding: 8px 18px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 0.82rem; font-weight: 500; transition: all 0.2s;
    }
    .filtro-btn:hover { border-color: #00d4ff; color: #00d4ff; }
    .filtro-btn.active { background: rgba(0,212,255,0.12); border-color: #00d4ff; color: #00d4ff; }
    .tabela-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08); }
    th {
      padding: 14px 18px; text-align: left; font-size: 0.78rem; font-weight: 600;
      color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px;
    }
    td {
      padding: 14px 18px; font-size: 0.87rem;
      border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge.baixo     { background: rgba(74,222,128,0.15);  color: #4ade80; }
    .badge.medio     { background: rgba(251,191,36,0.15);   color: #fbbf24; }
    .badge.alto      { background: rgba(251,146,60,0.15);   color: #fb923c; }
    .badge.critico   { background: rgba(248,113,113,0.15);  color: #f87171; }
    .badge.aberto    { background: rgba(96,165,250,0.15);   color: #60a5fa; }
    .badge.em-tratamento { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge.resolvido { background: rgba(74,222,128,0.15);   color: #4ade80; }
    .btn-acao {
      background: none; border: none; cursor: pointer;
      padding: 6px 10px; border-radius: 8px; font-size: 0.85rem; transition: background 0.2s;
    }
    .btn-acao:hover { background: rgba(255,255,255,0.08); }
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
    .empty-state div { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #0f1923; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 36px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.55); }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 0.9rem;
      outline: none; transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #00d4ff; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: #1a2535; }
    .auto-field {
      background: rgba(0,212,255,0.06) !important;
      border-color: rgba(0,212,255,0.2) !important;
      color: rgba(255,255,255,0.6) !important;
      cursor: not-allowed !important;
    }
    .auto-tag {
      font-size: 0.68rem; color: #00d4ff;
      background: rgba(0,212,255,0.1);
      border-radius: 20px; padding: 2px 8px;
      margin-left: 6px; font-weight: 600;
    }
    .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancelar {
      padding: 12px 24px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 0.9rem;
    }
    .btn-salvar {
      padding: 12px 28px; border-radius: 10px;
      background: linear-gradient(135deg, #f87171, #dc2626);
      border: none; color: #fff; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-salvar:hover { opacity: 0.85; }
    .detalhe-row {
      display: flex; gap: 8px; margin-bottom: 12px;
      padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .detalhe-row:last-child { border-bottom: none; }
    .detalhe-label { font-size: 0.78rem; color: rgba(255,255,255,0.4); min-width: 140px; font-weight: 600; }
    .detalhe-valor { font-size: 0.88rem; color: #fff; }
  </style>
</head>

    <p>Gestão de Segurança do Trabalho</p>
  </div>
