<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeNR — Login</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Círculos decorativos de fundo */
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
      top: -150px; left: -150px;
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,153,204,0.06) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(0,212,255,0.3);
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 3px;
    }

    .logo h1 span { color: #00d4ff; }

    .logo p {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.4;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 0.92rem;
      outline: none;
      transition: all 0.25s;
      font-family: inherit;
    }

    input:focus {
      border-color: #00d4ff;
      background: rgba(0,212,255,0.06);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    /* Toggle senha */
    .toggle-senha {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-senha:hover { color: rgba(255,255,255,0.7); }

    /* ── BOTÃO ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      letter-spacing: 1.5px;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,212,255,0.35);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── ERRO / SUCESSO ── */
    .alerta {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alerta.erro {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff7b7b;
    }

    .alerta.sucesso {
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80;
    }

    /* ── CREDENCIAIS DEMO ── */
    .demo-box {
      margin-top: 20px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .demo-box p {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .demo-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
      padding: 5px 4px;
    }

    .demo-item:last-child { border-bottom: none; }
    .demo-item:hover { background: rgba(0,212,255,0.08); }

    .demo-item span {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    .demo-item strong {
      font-size: 0.75rem;
      color: #00d4ff;
    }

    .demo-item .demo-hint {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
    }

    /* ── RODAPÉ ── */
    .versao {
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.7rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Safe<span>NR</span></h1>
    <p>Sistema de Gestão de Segurança do Trabalho</p>
  </div>

  <!-- FORM -->
  <div class="form-group">
    <label>E-mail</label>
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input
        type="email"
        id="email"
        placeholder="seu@email.com"
        autocomplete="email"
        onkeydown="if(event.key==='Enter') fazerLogin()"
      />
    </div>
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input
        type="password"
        id="senha"
        placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') fazerLogin()"
      />
      <button class="toggle-senha" onclick="toggleSenha()" title="Mostrar/ocultar senha" type="button">👁️</button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnTexto">🔐 ENTRAR</span>
  </button>

  <!-- ALERTAS -->
  <div class="alerta erro"   id="alertaErro">❌ E-mail ou senha incorretos.</div>
  <div class="alerta sucesso" id="alertaSucesso">✅ Login realizado! Redirecionando...</div>

  <!-- CREDENCIAIS DEMO -->
  <div class="demo-box">
    <p>🔑 Acesso rápido (demo)</p>
    <div class="demo-item" onclick="preencherLogin('admin@safenr.com.br','safenr2026')" title="Clique para preencher">
      <span>admin@safenr.com.br</span>
      <strong>Administrador</strong>
      <span class="demo-hint">↩ clique</span>
    </div>
    <div class="demo-item" onclick="preencherLogin('odair@safenr.com.br','safenr2026')" title="Clique para preencher">
      <span>odair@safenr.com.br</span>
      <strong>Odair Silva</strong>
      <span class="demo-hint">↩ clique</span>
    </div>
  </div>

  <div class="versao">SafeNR v1.0 © 2026 — Gestão de Segurança do Trabalho</div>
</div>

<script>
  // Redireciona se já estiver logado
  if (localStorage.getItem('safenr_user') || sessionStorage.getItem('safenr_user')) {
    window.location.href = './app.html';
  }

  // Usuários cadastrados (base local demo)
  var usuarios = [
    { email: 'admin@safenr.com.br', senha: 'safenr2026', nome: 'Administrador', perfil: 'Administrador' },
    { email: 'odair@safenr.com.br', senha: 'safenr2026', nome: 'Odair Silva',   perfil: 'Técnico SST'   }
  ];

  function fazerLogin() {
    var email = document.getElementById('email').value.trim().toLowerCase();
    var senha = document.getElementById('senha').value;
    var btn   = document.getElementById('btnLogin');
    var spin  = document.getElementById('spinner');
    var texto = document.getElementById('btnTexto');

    ocultarAlertas();

    if (!email || !senha) {
      mostrarAlerta('erro', '⚠️ Preencha e-mail e senha.');
      return;
    }

    // Verifica também usuários cadastrados em Configurações
    var usuariosSalvos = JSON.parse(localStorage.getItem('safenr_usuarios') || '[]');
    var todosUsuarios  = usuarios.concat(usuariosSalvos);

    var user = todosUsuarios.find(function(u) {
      return u.email.toLowerCase() === email && u.senha === senha;
    });

    // Loading
    btn.disabled      = true;
    spin.style.display = 'block';
    texto.textContent  = 'Entrando...';

    setTimeout(function() {
      if (user) {
        // Salva sessão
        var sessao = { nome: user.nome, email: user.email, perfil: user.perfil || 'Usuário' };
        localStorage.setItem('safenr_user', JSON.stringify(sessao));
        mostrarAlerta('sucesso', '✅ Login realizado! Redirecionando...');
        setTimeout(function() { window.location.href = './app.html'; }, 1000);
      } else {
        btn.disabled       = false;
        spin.style.display = 'none';
        texto.textContent  = '🔐 ENTRAR';
        mostrarAlerta('erro', '❌ E-mail ou senha incorretos.');
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
      }
    }, 700);
  }

  function preencherLogin(email, senha) {
    document.getElementById('email').value = email;
    document.getElementById('senha').value = senha;
    document.getElementById('email').focus();
    ocultarAlertas();
  }

  function toggleSenha() {
    var input = document.getElementById('senha');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function mostrarAlerta(tipo, msg) {
    var el = document.getElementById(tipo === 'erro' ? 'alertaErro' : 'alertaSucesso');
    el.textContent    = msg;
    el.style.display  = 'flex';
  }

  function ocultarAlertas() {
    document.getElementById('alertaErro').style.display    = 'none';
    document.getElementById('alertaSucesso').style.display = 'none';
  }
</script>

</body>
</html>
